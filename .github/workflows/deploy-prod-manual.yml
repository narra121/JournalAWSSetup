name: Deploy to Production (Manual)

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type "deploy-to-production" to confirm'
        required: true
        type: string

env:
  AWS_REGION: us-east-1
  SAM_CLI_TELEMETRY: 0

jobs:
  validate-confirmation:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "deploy-to-production" ]; then
            echo "::error::Confirmation text does not match. Deployment cancelled."
            exit 1
          fi
          echo "::notice::Confirmation validated. Proceeding with production deployment."

  deploy-prod:
    runs-on: ubuntu-latest
    needs: validate-confirmation
    steps:
      - uses: actions/checkout@v4
      
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: aws-actions/setup-sam@v2

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock', '**/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Cache SAM build
        uses: actions/cache@v4
        with:
          path: .aws-sam/cache
          key: sam-build-${{ runner.os }}-${{ hashFiles('src/**/*.ts', 'template.yaml') }}
          restore-keys: |
            sam-build-${{ runner.os }}-
      
      - name: Install dependencies
        run: bun install --frozen-lockfile
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Verify AWS identity
        run: aws sts get-caller-identity
      
      - name: Install esbuild globally for SAM
        run: bun install -g esbuild@latest

      - name: Ensure esbuild present
        run: bunx esbuild --version
      
      - name: SAM Build
        run: sam build --parallel --cached
      
      - name: Store Gemini API Key in SSM
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          aws ssm put-parameter \
            --name "/tradequt/geminiApiKey" \
            --value "${GEMINI_API_KEY}" \
            --type "SecureString" \
            --overwrite \
            --region $AWS_REGION
      
      - name: Store Stripe Secret Key in SSM
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY_PROD }}
        run: |
          aws ssm put-parameter \
            --name "/tradequt/stripeSecretKey" \
            --value "${STRIPE_SECRET_KEY}" \
            --type "SecureString" \
            --overwrite \
            --region $AWS_REGION

      - name: Store Stripe Webhook Secret in SSM
        env:
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET_PROD }}
        run: |
          aws ssm put-parameter \
            --name "/tradequt/stripeWebhookSecret" \
            --value "${STRIPE_WEBHOOK_SECRET}" \
            --type "SecureString" \
            --overwrite \
            --region $AWS_REGION

      - name: Store Stripe Price IDs in SSM
        run: |
          aws ssm put-parameter \
            --name "/tradequt/prod/stripe/price/monthly_inr" \
            --value "${{ secrets.STRIPE_PRICE_MONTHLY_INR_PROD }}" \
            --type "String" \
            --overwrite \
            --region $AWS_REGION
          aws ssm put-parameter \
            --name "/tradequt/prod/stripe/price/yearly_inr" \
            --value "${{ secrets.STRIPE_PRICE_YEARLY_INR_PROD }}" \
            --type "String" \
            --overwrite \
            --region $AWS_REGION
          aws ssm put-parameter \
            --name "/tradequt/prod/stripe/price/monthly_usd" \
            --value "${{ secrets.STRIPE_PRICE_MONTHLY_USD_PROD }}" \
            --type "String" \
            --overwrite \
            --region $AWS_REGION
          aws ssm put-parameter \
            --name "/tradequt/prod/stripe/price/yearly_usd" \
            --value "${{ secrets.STRIPE_PRICE_YEARLY_USD_PROD }}" \
            --type "String" \
            --overwrite \
            --region $AWS_REGION

      - name: Deploy to Prod
        run: |
          sam deploy \
            --stack-name tradequt-prod \
            --s3-bucket tradequt-sam-artifacts \
            --s3-prefix tradequt-backend \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              StageName=tradequt-prod \
              ApiVersion=v1 \
              LogRetentionDays=14 \
              GeminiApiKeyParamName=/tradequt/geminiApiKey \
              StripeSecretKeyParamName=/tradequt/stripeSecretKey \
              StripeWebhookSecretParamName=/tradequt/stripeWebhookSecret \
              UseExistingResources=false \
              CustomDomainName=api.tradequt.com \
              CertificateArn=${{ secrets.ACM_CERTIFICATE_ARN }} \
              HostedZoneId=${{ secrets.HOSTED_ZONE_ID }} \
              "AllowedOrigins=https://tradequt.com,https://www.tradequt.com"
      
      - name: Get Stack Outputs
        run: |
          echo "## Production Deployment Complete! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Stack Outputs:" >> $GITHUB_STEP_SUMMARY
          aws cloudformation describe-stacks --stack-name tradequt-prod --query "Stacks[0].Outputs" >> $GITHUB_STEP_SUMMARY
