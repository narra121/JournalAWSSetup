name: Deploy Backend (Dev)

on:
  workflow_run:
    workflows: ["Tests"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

env:
  AWS_REGION: us-east-1
  SAM_CLI_TELEMETRY: 0

jobs:
  build:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: aws-actions/setup-sam@v2
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lockb', '**/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Cache SAM build
        uses: actions/cache@v4
        with:
          path: .aws-sam/cache
          key: sam-build-${{ runner.os }}-${{ hashFiles('src/**/*.ts', 'template.yaml') }}
          restore-keys: |
            sam-build-${{ runner.os }}-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Validate SAM template
        run: sam validate --region $AWS_REGION
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Verify AWS identity
        run: aws sts get-caller-identity
      - name: Install esbuild globally for SAM
        run: bun install -g esbuild@latest
      - name: Ensure esbuild present
        run: bunx esbuild --version
      - name: SAM Build
        run: sam build --parallel --cached
      - name: Upload SAM build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sam-build
          path: .aws-sam/build

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v4
        with:
          name: sam-build
          path: .aws-sam/build
      - uses: aws-actions/setup-sam@v2
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Verify AWS identity
        run: aws sts get-caller-identity
      - name: Store Gemini API Key in SSM
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          aws ssm put-parameter \
            --name "/tradequt/geminiApiKey" \
            --value "${GEMINI_API_KEY}" \
            --type "SecureString" \
            --overwrite \
            --region $AWS_REGION

      - name: Store Razorpay Webhook Secret in SSM
        env:
          RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET_DEV }}
        run: |
          aws ssm put-parameter \
            --name "/tradequt/razorpayWebhookSecret" \
            --value "${RAZORPAY_WEBHOOK_SECRET}" \
            --type "SecureString" \
            --overwrite \
            --region $AWS_REGION

      - name: Install esbuild for SAM sync
        run: bun install -g esbuild@latest
      - name: Deploy to Dev (incremental)
        env:
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID_DEV }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET_DEV }}
          RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET_DEV }}
        run: |
          sam sync \
            --stack-name tradequt-dev \
            --s3-bucket tradequt-sam-artifacts \
            --s3-prefix tradequt-backend \
            --no-watch \
            --yes \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              StageName=tradequt-dev \
              ApiVersion=v1 \
              LogRetentionDays=7 \
              GeminiApiKeyParamName=/tradequt/geminiApiKey \
              RazorpayWebhookSecretParamName=/tradequt/razorpayWebhookSecret \
              UseExistingResources=false \
              RazorpayKeyId="${RAZORPAY_KEY_ID}" \
              RazorpayKeySecret="${RAZORPAY_KEY_SECRET}" \
              RazorpayWebhookSecret="${RAZORPAY_WEBHOOK_SECRET}" \
              CustomDomainName=api-dev.tradequt.com \
              CertificateArn=${{ secrets.ACM_CERTIFICATE_ARN }} \
              HostedZoneId=${{ secrets.HOSTED_ZONE_ID }} \
              AllowedOrigins=https://dev.tradequt.com
