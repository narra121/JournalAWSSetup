name: Deploy AWS SAM Application

on:
  workflow_run:
    workflows: ["Tests"]
    types:
      - completed
    branches:
      - main

# Prevent overlapping deploys to same branch
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

env:
  AWS_REGION: us-east-1 # Adjust region if needed
  SAM_CLI_TELEMETRY: 0

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: aws-actions/setup-sam@v2
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lockb', '**/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Cache SAM build
        uses: actions/cache@v4
        with:
          path: .aws-sam/cache
          key: sam-build-${{ runner.os }}-${{ hashFiles('src/**/*.ts', 'template.yaml') }}
          restore-keys: |
            sam-build-${{ runner.os }}-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Validate SAM template
        run: sam validate --region $AWS_REGION
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Verify AWS identity
        run: aws sts get-caller-identity
      - name: Install esbuild globally for SAM
        run: bun install -g esbuild@latest
      - name: Ensure esbuild present
        run: bunx esbuild --version
      - name: SAM Build
        run: sam build --parallel --cached
      - name: Upload SAM build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sam-build
          path: .aws-sam/build

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v4
        with:
          name: sam-build
          path: .aws-sam/build
      - uses: aws-actions/setup-sam@v2
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Verify AWS identity
        run: aws sts get-caller-identity
      - name: Store Gemini API Key in SSM
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          aws ssm put-parameter \
            --name "/tradeflow/geminiApiKey" \
            --value "${GEMINI_API_KEY}" \
            --type "SecureString" \
            --overwrite \
            --region $AWS_REGION

      - name: Store Razorpay Webhook Secret in SSM
        env:
          RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET_DEV }}
        run: |
          aws ssm put-parameter \
            --name "/tradeflow/razorpayWebhookSecret" \
            --value "${RAZORPAY_WEBHOOK_SECRET}" \
            --type "SecureString" \
            --overwrite \
            --region $AWS_REGION

      - name: Install esbuild for SAM sync
        run: bun install -g esbuild@latest
      - name: Deploy to Dev (incremental)
        env:
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID_DEV }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET_DEV }}
          RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET_DEV }}
        run: |
          sam sync \
            --stack-name tradeflow-dev \
            --no-watch \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              StageName=tradeflow-dev \
              ApiVersion=v1 \
              LogRetentionDays=7 \
              GeminiApiKeyParamName=/tradeflow/geminiApiKey \
              RazorpayWebhookSecretParamName=/tradeflow/razorpayWebhookSecret \
              UseExistingResources=false \
              RazorpayKeyId="${RAZORPAY_KEY_ID}" \
              RazorpayKeySecret="${RAZORPAY_KEY_SECRET}" \
              RazorpayWebhookSecret="${RAZORPAY_WEBHOOK_SECRET}"

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-dev
    steps:
      - name: Production deployment skipped
        run: |
          echo "::notice::✅ Dev deployment completed successfully"
          echo "::notice::⏭️ Production deployment skipped - requires manual approval"
          echo "::notice::📋 To deploy to production:"
          echo "::notice::   1. Go to Actions tab"
          echo "::notice::   2. Select 'Deploy to Production (Manual)'"
          echo "::notice::   3. Click 'Run workflow'"
          echo "::notice::   4. Type 'deploy-to-production' and confirm"
