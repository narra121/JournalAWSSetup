  UpdateStatsFunction:
    Type: AWS::Serverless::Function
    Condition: CreateNewDataResources
    Properties:
      CodeUri: .
      Handler: src/handlers/update-stats/app.handler

      Timeout: 30
      MemorySize: 256
      Policies:
        - DynamoDBReadPolicy:
            TableName: !If [CreateNewDataResources, !Ref TradesTable, !Ref ExistingTradesTableName]
        - DynamoDBCrudPolicy:
            TableName: !If [CreateNewDataResources, !Ref AccountsTable, '']
        - DynamoDBCrudPolicy:
            TableName: !If [CreateNewDataResources, !Ref DailyStatsTable, '']
        - DynamoDBCrudPolicy:
            TableName: !If [CreateNewDataResources, !Ref SavedOptionsTable, '']
        - DynamoDBCrudPolicy:
            TableName: !If [CreateNewDataResources, !Ref InsightsCacheTable, '']
        - SQSSendMessagePolicy:
            QueueName: !If [CreateNewDataResources, !GetAtt RefreshInsightsQueue.QueueName, '']
      Environment:
        Variables:
          REFRESH_INSIGHTS_QUEUE_URL: !If [CreateNewDataResources, !Ref RefreshInsightsQueue, '']
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt StatsDLQ.Arn
      Events:
        Stream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt TradesTable.StreamArn
            StartingPosition: LATEST
            BisectBatchOnFunctionError: true
            MaximumRetryAttempts: 2
            DestinationConfig:
              OnFailure:
                Destination: !GetAtt StatsDLQ.Arn
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/handlers/update-stats/app.ts
        Minify: true
        Target: es2020
        Sourcemap: false
        External:
          - "@aws-sdk/*"

  StatsDLQ:
    Type: AWS::SQS::Queue
    Condition: CreateNewDataResources
    Properties:
      QueueName: !Sub stats-dlq-${StageName}
      MessageRetentionPeriod: 1209600 # 14 days

  StatsFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: CreateNewDataResources
    Properties:
      AlarmName: !Sub StatsFunctionErrors-${StageName}
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref UpdateStatsFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  # --- Insights Background Refresh ---
  RefreshInsightsQueue:
    Type: AWS::SQS::Queue
    Condition: CreateNewDataResources
    Properties:
      QueueName: !Sub refresh-insights-${StageName}
      VisibilityTimeout: 600
      MessageRetentionPeriod: 86400
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt RefreshInsightsDLQ.Arn
        maxReceiveCount: 3

  RefreshInsightsDLQ:
    Type: AWS::SQS::Queue
    Condition: CreateNewDataResources
    Properties:
      QueueName: !Sub refresh-insights-dlq-${StageName}
      MessageRetentionPeriod: 1209600

  RefreshInsightsJobFunction:
    Type: AWS::Serverless::Function
    Condition: CreateNewDataResources
    Properties:
      CodeUri: .
      Handler: src/handlers/refresh-insights-job/app.handler
      Description: Background job to regenerate stale AI insights (SQS-triggered, BatchSize 8)
      Timeout: 120
      MemorySize: 1024
      ReservedConcurrentExecutions: 1
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - ssm:GetParameter
            Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${GeminiApiKeyParamName}"
        - Statement:
            Effect: Allow
            Action:
              - kms:Decrypt
            Resource: "*"
        - DynamoDBReadPolicy:
            TableName: !If [CreateNewDataResources, !Ref TradesTable, !Ref ExistingTradesTableName]
        - DynamoDBReadPolicy:
            TableName: !If [CreateNewDataResources, !Ref DailyStatsTable, '']
        - DynamoDBReadPolicy:
            TableName: !If [CreateNewDataResources, !Ref SubscriptionsTable, !Sub 'Subscriptions-${StageName}']
        - DynamoDBCrudPolicy:
            TableName: !If [CreateNewDataResources, !Ref InsightsCacheTable, '']
        - SQSPollerPolicy:
            QueueName: !GetAtt RefreshInsightsQueue.QueueName
      Environment:
        Variables:
          GEMINI_API_KEY_PARAM: !Ref GeminiApiKeyParamName
          REFRESH_INSIGHTS_QUEUE_URL: !Ref RefreshInsightsQueue
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt RefreshInsightsQueue.Arn
            BatchSize: 8
            MaximumBatchingWindowInSeconds: 300
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/handlers/refresh-insights-job/app.ts
        Minify: true
        Target: es2020
        Sourcemap: false
        External:
          - "@aws-sdk/*"

