AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Serverless Trading Journal Backend (Cognito + HTTP API + Lambda + DynamoDB + S3)

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures:
      - arm64
    Timeout: 10
    MemorySize: 256
    Tracing: PassThrough
    Environment:
      Variables:
        # Allow either newly created resources or existing ones passed in via parameters
        TRADES_TABLE: !If [CreateNewDataResources, !Ref TradesTable, !Ref ExistingTradesTableName]
        IMAGES_BUCKET: !If [CreateNewDataResources, !Ref ImagesBucket, !Ref ExistingImagesBucketName]
        RATE_LIMIT_TABLE: !If [CreateNewDataResources, !Ref AuthRateLimitTable, !Ref ExistingAuthRateLimitTableName]
        ACCOUNTS_TABLE: !If [CreateNewDataResources, !Ref AccountsTable, '']
        GOALS_TABLE: !If [CreateNewDataResources, !Ref GoalsTable, '']
        RULES_TABLE: !If [CreateNewDataResources, !Ref RulesTable, '']
        USER_PREFERENCES_TABLE: !If [CreateNewDataResources, !Ref UserPreferencesTable, '']
        SAVED_OPTIONS_TABLE: !If [CreateNewDataResources, !Ref SavedOptionsTable, '']
        DAILY_STATS_TABLE: !If [CreateNewDataResources, !Ref DailyStatsTable, '']
        ERROR_REPORTS_BUCKET: !If [CreateNewDataResources, !Ref ErrorReportsBucket, '']
        SUBSCRIPTIONS_TABLE: !If [CreateNewDataResources, !Ref SubscriptionsTable, '']
        INSIGHTS_CACHE_TABLE: !If [CreateNewDataResources, !Ref InsightsCacheTable, '']
        USER_POOL_ID: !Ref UserPool
        USER_POOL_CLIENT_ID: !Ref UserPoolClient
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'
        LOG_LEVEL: info

Parameters:
  StageName:
    Type: String
    Default: prod
    Description: Deployment stage (lowercase) used in resource names.
    AllowedPattern: '^[a-z0-9-]+$'
  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, prod]
    Description: Environment name (dev or prod) used for SSM parameter paths and configuration.
  ApiVersion:
    Type: String
    Default: v1
    Description: API version prefix (e.g. v1)
  LogRetentionDays:
    Type: Number
    Default: 14
    AllowedValues: [1,3,5,7,14,30,60,90,120,150,180,365,400,545,731,1827,3653]
    Description: CloudWatch Logs retention in days (10 is not supported; choose nearest 7 or 14).
  GeminiApiKeyParamName:
    Type: String
    Default: /tradequt/geminiApiKey
    Description: Name of SSM SecureString parameter storing the Gemini API key.
  StripeSecretKeyParamName:
    Type: String
    Default: /tradequt/dev/stripeSecretKey
    Description: Name of SSM SecureString parameter storing the Stripe secret key.
  StripeWebhookSecretParamName:
    Type: String
    Default: /tradequt/dev/stripeWebhookSecret
    Description: Name of SSM SecureString parameter storing the Stripe webhook secret.
  AdConfigParamName:
    Type: String
    Default: /tradequt/dev/adConfig
    Description: Name of SSM parameter storing the ad placement configuration JSON.
  UseExistingResources:
    Type: String
    Default: "false"
    AllowedValues: ["true","false"]
    Description: Set to true to reuse existing DynamoDB tables & S3 bucket instead of creating new ones.
  ExistingTradesTableName:
    Type: String
    Default: ""
    Description: Name of an existing Trades table (required if UseExistingResources=true)
  ExistingImagesBucketName:
    Type: String
    Default: ""
    Description: Name of an existing Images bucket (required if UseExistingResources=true)
  ExistingAuthRateLimitTableName:
    Type: String
    Default: ""
    Description: Name of an existing AuthRateLimit table (required if UseExistingResources=true)
  CustomDomainName:
    Type: String
    Default: ""
    Description: Custom domain name for the API (e.g. api.tradequt.com). Leave empty to skip.
  CertificateArn:
    Type: String
    Default: ""
    Description: ACM certificate ARN for the custom domain (must be in us-east-1).
  HostedZoneId:
    Type: String
    Default: ""
    Description: Route 53 hosted zone ID for DNS record creation.
  AllowedOrigins:
    Type: String
    Default: "https://tradequt.com,https://www.tradequt.com"
    Description: Comma-separated list of allowed CORS origins (e.g. https://tradequt.com,https://www.tradequt.com).
  # --- Frontend infrastructure parameters (CloudFront + S3 hosting) ---
  CreateFrontendInfra:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >-
      Set to "true" on first deployment to create S3 bucket, CloudFront distribution,
      and DNS records for the frontend. Leave "false" for existing environments.
      Once created, keep "true" so CloudFormation manages the resources.
  FrontendDomainName:
    Type: String
    Default: ""
    Description: Primary domain for the frontend (e.g. dev.tradequt.com or tradequt.com). Required when CreateFrontendInfra=true.
  FrontendWwwDomain:
    Type: String
    Default: ""
    Description: Optional www alias for the frontend (e.g. www.tradequt.com). Leave empty for dev environments.
  GoogleClientId:
    Type: String
    Default: ""
    Description: Google OAuth Client ID for Sign-In with Google. Leave empty to skip Google auth setup.
  GoogleClientSecret:
    Type: String
    Default: ""
    NoEcho: true
    Description: Google OAuth Client Secret (SSM Secure references not supported for Cognito IdP).

Conditions:
  CreateNewDataResources: !Equals [!Ref UseExistingResources, "false"]
  HasGoogleAuth: !Not [!Equals [!Ref GoogleClientId, ""]]
  HasCustomDomain: !Not [!Equals [!Ref CustomDomainName, ""]]
  ShouldCreateFrontendInfra: !Equals [!Ref CreateFrontendInfra, "true"]
  HasFrontendWwwDomain: !Not [!Equals [!Ref FrontendWwwDomain, ""]]
  HasHostedZone: !Not [!Equals [!Ref HostedZoneId, ""]]
  IsProd: !Equals [!Ref Environment, "prod"]
  CreateFrontendDns: !And
    - !Condition ShouldCreateFrontendInfra
    - !Condition HasHostedZone
  CreateFrontendWwwDns: !And
    - !Condition ShouldCreateFrontendInfra
    - !Condition HasHostedZone
    - !Condition HasFrontendWwwDomain

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub TradeQutUserPool-${StageName}
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      Policies:
        PasswordPolicy:
          MinimumLength: 6
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
      LambdaConfig:
        PreSignUp: !GetAtt PreSignUpFunction.Arn
        PostConfirmation: !GetAtt PostConfirmationFunction.Arn
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    # Ensure Google IdP exists before client references it as SupportedIdentityProvider
    DependsOn: GoogleIdentityProvider
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: web
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      SupportedIdentityProviders: !If
        - HasGoogleAuth
        - - COGNITO
          - Google
        - - COGNITO
      AllowedOAuthFlowsUserPoolClient: !If [HasGoogleAuth, true, false]
      AllowedOAuthFlows: !If
        - HasGoogleAuth
        - - code
        - !Ref AWS::NoValue
      AllowedOAuthScopes: !If
        - HasGoogleAuth
        - - openid
          - email
          - profile
        - !Ref AWS::NoValue
      CallbackURLs: !If
        - HasGoogleAuth
        - - https://tradequt.com/auth/callback
          - https://www.tradequt.com/auth/callback
          - https://dev.tradequt.com/auth/callback
          - http://localhost:5173/auth/callback
        - - http://localhost:5173/
      LogoutURLs: !If
        - HasGoogleAuth
        - - https://tradequt.com/login
          - https://www.tradequt.com/login
          - https://dev.tradequt.com/login
          - http://localhost:5173/login
        - - http://localhost:5173/

  # Google Identity Provider (only created when GoogleClientId is provided)
  GoogleIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Condition: HasGoogleAuth
    Properties:
      UserPoolId: !Ref UserPool
      ProviderName: Google
      ProviderType: Google
      ProviderDetails:
        client_id: !Ref GoogleClientId
        client_secret: !Ref GoogleClientSecret
        authorize_scopes: "openid email profile"
      AttributeMapping:
        email: email
        name: name
        username: sub

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Condition: HasGoogleAuth
    Properties:
      Domain: !Sub "auth-${StageName}.tradequt.com"
      UserPoolId: !Ref UserPool
      CustomDomainConfig:
        CertificateArn: !Ref CertificateArn

  AuthDomainDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasGoogleAuth
    DependsOn: UserPoolDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "auth-${StageName}.tradequt.com"
      Type: A
      AliasTarget:
        DNSName: !GetAtt UserPoolDomain.CloudFrontDistribution
        HostedZoneId: Z2FDTNDATAQYW2

  # Cognito trigger Lambda functions
  PreSignUpFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/auth-pre-signup/app.handler
      # Override Globals env vars to break circular dep: UserPool → this function → UserPool/UserPoolClient
      Environment:
        Variables:
          USER_POOL_ID: "COGNITO_TRIGGER"
          USER_POOL_CLIENT_ID: "COGNITO_TRIGGER"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/handlers/auth-pre-signup/app.ts
        Minify: true
        Target: es2020
        Sourcemap: false
        External:
          - "@aws-sdk/*"

  PostConfirmationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/auth-post-confirmation/app.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !If [CreateNewDataResources, !Ref RulesTable, '']
        - DynamoDBCrudPolicy:
            TableName: !If [CreateNewDataResources, !Ref SavedOptionsTable, '']
        - DynamoDBCrudPolicy:
            TableName: !If [CreateNewDataResources, !Ref SubscriptionsTable, '']
      # Override Globals env vars to break circular dep: UserPool → this function → UserPool/UserPoolClient
      Environment:
        Variables:
          USER_POOL_ID: "COGNITO_TRIGGER"
          USER_POOL_CLIENT_ID: "COGNITO_TRIGGER"
          RULES_TABLE: !If [CreateNewDataResources, !Ref RulesTable, '']
          SAVED_OPTIONS_TABLE: !If [CreateNewDataResources, !Ref SavedOptionsTable, '']
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/handlers/auth-post-confirmation/app.ts
        Minify: true
        Target: es2020
        Sourcemap: false
        External:
          - "@aws-sdk/*"

  PreSignUpInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PreSignUpFunction
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt UserPool.Arn

  # Standalone policy for PreSignUp — avoids circular dep (UserPool → PreSignUpFunction → Role → UserPool)
  PreSignUpCognitoPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: PreSignUpCognitoAccess
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - cognito-idp:ListUsers
              - cognito-idp:AdminLinkProviderForUser
            Resource: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*"
      Roles:
        - !Ref PreSignUpFunctionRole

  PostConfirmationInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PostConfirmationFunction
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt UserPool.Arn

  ErrorReportsBucket:
    Type: AWS::S3::Bucket
    Condition: CreateNewDataResources
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ErrorReportsLifecycle
            Status: Enabled
            Prefix: errors/
            Transitions:
              - TransitionInDays: 30
                StorageClass: GLACIER
            ExpirationInDays: 365
      Tags:
        - Key: Project
          Value: TradeQut

  ImagesBucket:
    Type: AWS::S3::Bucket
    Condition: CreateNewDataResources
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      # Restrict CORS to only allow authenticated API calls, not direct browser access
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: !Split [",", !Ref AllowedOrigins]
            AllowedHeaders:
              - "Authorization"
              - "Content-Type"
            AllowedMethods: [GET, PUT]
            MaxAge: 300
      # Block all public access - images can only be accessed through Lambda
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ArchiveOldImages
            Status: Enabled
            Prefix: images/
            Transitions:
              - TransitionInDays: 90
                StorageClass: GLACIER_IR
            ExpirationInDays: 1825

  # Explicit bucket policy to enforce secure transport only
  ImagesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: CreateNewDataResources
    Properties:
      Bucket: !Ref ImagesBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureConnections
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource: 
              - !Sub "arn:aws:s3:::${ImagesBucket}/*"
              - !Sub "arn:aws:s3:::${ImagesBucket}"
            Condition:
              Bool:
                "aws:SecureTransport": "false"

  TradesTable:
    Type: AWS::DynamoDB::Table
    Condition: CreateNewDataResources
    Properties:
      # Include ApiVersion so table replacement can occur when adding new GSIs; avoids multi-GSI update limit
      TableName: !Sub Trades-${StageName}-${ApiVersion}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: tradeId
          AttributeType: S
        - AttributeName: openDate
          AttributeType: S
        - AttributeName: idempotencyKey
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: tradeId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: trades-by-date-gsi
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: openDate
              KeyType: RANGE
          Projection:
            ProjectionType: KEYS_ONLY
        - IndexName: user-idempotency-gsi
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: idempotencyKey
              KeyType: RANGE
          Projection:
            ProjectionType: KEYS_ONLY
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
  DailyStatsTable:
    Type: AWS::DynamoDB::Table
    Condition: CreateNewDataResources
    Properties:
      TableName: !Sub DailyStats-${StageName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: date
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: stats-by-date-gsi
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  AuthRateLimitTable:
    Type: AWS::DynamoDB::Table
    Condition: CreateNewDataResources
    Properties:
      TableName: !Sub AuthRateLimit-${StageName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: key
          AttributeType: S
      KeySchema:
        - AttributeName: key
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  AccountsTable:
    Type: AWS::DynamoDB::Table
    Condition: CreateNewDataResources
    Properties:
      TableName: !Sub Accounts-${StageName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: accountId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: accountId
          KeyType: RANGE

  GoalsTable:
    Type: AWS::DynamoDB::Table
    Condition: CreateNewDataResources
    Properties:
      TableName: !Sub Goals-${StageName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: goalId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: goalId
          KeyType: RANGE

  RulesTable:
    Type: AWS::DynamoDB::Table
    Condition: CreateNewDataResources
    Properties:
      TableName: !Sub Rules-${StageName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: ruleId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: ruleId
          KeyType: RANGE

  UserPreferencesTable:
    Type: AWS::DynamoDB::Table
    Condition: CreateNewDataResources
    Properties:
      TableName: !Sub UserPreferences-${StageName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  SavedOptionsTable:
    Type: AWS::DynamoDB::Table
    Condition: CreateNewDataResources
    Properties:
      TableName: !Sub SavedOptions-${StageName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  SubscriptionsTable:
    Type: AWS::DynamoDB::Table
    Condition: CreateNewDataResources
    Properties:
      TableName: !Sub Subscriptions-${StageName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  InsightsCacheTable:
    Type: AWS::DynamoDB::Table
    Condition: CreateNewDataResources
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub InsightsCache-${StageName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: cacheKey
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: cacheKey
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref StageName
      Auth:
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
              audience: [!Ref UserPoolClient]
        DefaultAuthorizer: CognitoAuthorizer
      CorsConfiguration:
        AllowOrigins: !Split [",", !Ref AllowedOrigins]
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          - OPTIONS
        AllowHeaders:
          - Authorization
          - Content-Type
          - X-Amz-Date
          - X-Api-Key
        ExposeHeaders:
          - Content-Type
          - Authorization
        MaxAge: 3600

  CreateTradeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/create-trade/app.handler

      Policies:
        - DynamoDBReadPolicy:
            TableName: !If [CreateNewDataResources, !Ref SubscriptionsTable, !Sub 'Subscriptions-${StageName}']
        - DynamoDBCrudPolicy:
            TableName: !If [CreateNewDataResources, !Ref TradesTable, !Ref ExistingTradesTableName]
        - Statement:
            Effect: Allow
            Action:
              - s3:ListBucket
            Resource: !If [CreateNewDataResources, !GetAtt ImagesBucket.Arn, !Sub "arn:aws:s3:::${ExistingImagesBucketName}"]
        - Statement:
            Effect: Allow
            Action:
              - s3:PutObject
            Resource: !If [CreateNewDataResources, !Sub "${ImagesBucket.Arn}/images/*", !Sub "arn:aws:s3:::${ExistingImagesBucketName}/images/*"]
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/trades
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/handlers/create-trade/app.ts
        Minify: true
        Target: es2020
        Sourcemap: false
        External:
          - "@aws-sdk/*"
  ListTradesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/list-trades/app.handler

      Policies:
        - DynamoDBReadPolicy:
            TableName: !If [CreateNewDataResources, !Ref TradesTable, !Ref ExistingTradesTableName]
        - Statement:
            Effect: Allow
            Action:
              - s3:ListBucket
            Resource: !If [CreateNewDataResources, !GetAtt ImagesBucket.Arn, !Sub "arn:aws:s3:::${ExistingImagesBucketName}"]
        - Statement:
            Effect: Allow
            Action:
              - s3:GetObject
            Resource: !If [CreateNewDataResources, !Sub "${ImagesBucket.Arn}/images/*", !Sub "arn:aws:s3:::${ExistingImagesBucketName}/images/*"]
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/trades
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/handlers/list-trades/app.ts
        Minify: true
        Target: es2020
        Sourcemap: false
        External:
          - "@aws-sdk/*"
  UpdateTradeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/update-trade/app.handler

      Policies:
        - DynamoDBReadPolicy:
            TableName: !If [CreateNewDataResources, !Ref SubscriptionsTable, !Sub 'Subscriptions-${StageName}']
        - DynamoDBCrudPolicy:
            TableName: !If [CreateNewDataResources, !Ref TradesTable, !Ref ExistingTradesTableName]
        - Statement:
            Effect: Allow
            Action:
              - s3:ListBucket
            Resource: !If [CreateNewDataResources, !GetAtt ImagesBucket.Arn, !Sub "arn:aws:s3:::${ExistingImagesBucketName}"]
        - Statement:
            Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:DeleteObject
            Resource: !If [CreateNewDataResources, !Sub "${ImagesBucket.Arn}/images/*", !Sub "arn:aws:s3:::${ExistingImagesBucketName}/images/*"]
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/trades/{tradeId}
            Method: PUT
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/handlers/update-trade/app.ts
        Minify: true
        Target: es2020
        Sourcemap: false
        External:
          - "@aws-sdk/*"
  DeleteTradeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/delete-trade/app.handler

      Environment:
        Variables:
          IMAGES_BUCKET: !If [CreateNewDataResources, !Ref ImagesBucket, !Ref ExistingImagesBucketName]
      Policies:
        - DynamoDBReadPolicy:
            TableName: !If [CreateNewDataResources, !Ref SubscriptionsTable, !Sub 'Subscriptions-${StageName}']
        - DynamoDBCrudPolicy:
            TableName: !If [CreateNewDataResources, !Ref TradesTable, !Ref ExistingTradesTableName]
        - Statement:
            Effect: Allow
            Action:
              - s3:ListBucket
            Resource: !If [CreateNewDataResources, !GetAtt ImagesBucket.Arn, !Sub "arn:aws:s3:::${ExistingImagesBucketName}"]
        - Statement:
            Effect: Allow
            Action:
              - s3:DeleteObject
              - s3:DeleteObjectVersion
              - s3:GetObject
            Resource: !If [CreateNewDataResources, !Sub "${ImagesBucket.Arn}/images/*", !Sub "arn:aws:s3:::${ExistingImagesBucketName}/images/*"]
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/trades/{tradeId}
            Method: DELETE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/handlers/delete-trade/app.ts
        Minify: true
        Target: es2020
        Sourcemap: false
        External:
          - "@aws-sdk/*"
  BulkDeleteTradesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/bulk-delete-trades/app.handler

      Description: Bulk delete trades
      Environment:
        Variables:
          IMAGES_BUCKET: !If [CreateNewDataResources, !Ref ImagesBucket, !Ref ExistingImagesBucketName]
      Policies:
        - DynamoDBReadPolicy:
            TableName: !If [CreateNewDataResources, !Ref SubscriptionsTable, !Sub 'Subscriptions-${StageName}']
